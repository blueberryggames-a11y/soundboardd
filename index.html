<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Cloud Soundboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/spinner.css" />
</head>
<body>

    <header class="hero">
        <h1>Live Soundboard</h1>
        
        <!-- Live User Counter -->
        <div class="live-counter">
            <span class="dot"></span>
            <span id="userCount">1</span> People Online
        </div>

        <div class="upload-container">
            <div class="header-buttons">
                <button id="toggleUpload" class="btn-main">＋ Add One</button>
                <button id="bulkSyncBtn" class="btn-main secondary">📁 Bulk Sync Folder</button>
            </div>

            <input type="file" id="folderInput" webkitdirectory directory multiple hidden>
            
            <div id="uploadForm" class="upload-card hidden">
                <h3>New Audio Upload</h3>
                <div class="form-group">
                    <label for="audioFile" class="file-drop">
                        <span id="fileStatus">Click to select MP3 (Max 700KB)</span>
                        <input type="file" id="audioFile" accept="audio/mpeg" hidden>
                    </label>
                </div>
                <input type="text" id="soundName" placeholder="Sound Name (Optional)">
                <button id="submitUpload" class="btn-submit">Sync to Cloud</button>
            </div>
        </div>
    </header>

    <main class="soundboard-container">
        <div class="flex-container" id="soundGrid">
            <div class="spinner"></div>
        </div>
    </main>

    <div class="control-dock">
        <div class="dock-content">
            <span class="dock-info">Global</span>
            <div class="dock-btns">
                <button class="btn-dock chaos" onclick="playAll()">Chaos</button>
                <button class="btn-dock stop" onclick="stopAll()">Stop All</button>
            </div>
        </div>
    </div>

    <script type="module" src="loader.js"></script>
</body>
</html>
