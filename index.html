<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Soundboard (No Storage)</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/spinner.css" />
    <link rel="manifest" href="./manifest.json" />
</head>
<body>

    <header class="hero">
        <h1>Live Soundboard</h1>
        <p class="subtitle">Synced via Cloud Firestore</p>
        
        <div class="upload-container">
            <button id="toggleUpload" class="btn-main">＋ Add New Sound</button>
            <div id="uploadForm" class="upload-card hidden">
                <label for="audioFile" class="file-drop">
                    <span id="fileStatus">Select MP3 (Max 700KB)</span>
                    <input type="file" id="audioFile" accept="audio/mpeg" hidden>
                </label>
                <input type="text" id="soundName" placeholder="Sound Name">
                <button id="submitUpload" class="btn-submit">Upload to Cloud</button>
            </div>
        </div>
    </header>

    <main class="soundboard-container">
        <div class="flex-container" id="soundGrid">
            <div class="spinner"></div>
        </div>
    </main>

    <div class="control-dock">
        <button class="btn-dock chaos" onclick="playAll()">Chaos</button>
        <button class="btn-dock stop" onclick="stopAll()">Stop</button>
    </div>

    <script type="module" src="loader.js"></script>
</body>
</html>
