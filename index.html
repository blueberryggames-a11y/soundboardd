<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Soundboard</title>
  <meta name="description" content="A collection of sounds to play out of context. Perfect for school! Just play it when your teacher is talking and I bet they will love it!" />
  <meta name="robots" content="index, follow" />
  
  <!-- Modern Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/spinner.css" />
  <link rel="icon" href="img/mlg-favicon.png" />
  <link rel="shortcut icon" href="img/mlg-favicon.png" type="image/x-icon" />
  <link rel="apple-touch-icon" href="img/mlg-favicon.png" type="image/x-icon" />
  <link rel="manifest" href="./manifest.json" />

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("/sw.js")
        .then(function (registration) {
          console.log("Service worker registered:", registration);
        })
        .catch(function (error) {
          console.log("Service worker registration failed:", error);
        });
    }
  </script>
</head>
<body>
  
  <header class="hero">
    <h1>Online Soundboard</h1>
    <h2>
      Click the colorful buttons to play a sound.<br />
      <a href="https://forms.gle/hoiTBEZ4p14iupXH6" target="_blank" rel="noopener noreferrer">Submit a sound to be added!</a>
    </h2>
  </header>

  <div class="soundboard-container">
    <div class="flex-container">
      <div class="spinner"></div>
      <!-- loader.js populates sounds here -->
    </div>
  </div>

  <div class="control">
    <span class="control-label">Audio Controls</span>
    <button class="woah btn-provoke" onclick="javascript:playAll()">Provoke Chaos</button>
    <button class="woah btn-stop" onclick="javascript:stopAll()">Stop Everything</button>
  </div>

  <p id="footer">3kh0 © 2023</p>

  <script type="application/javascript" src="loader.js"></script>
</body>
</html>
